name: Sync Develop to Hugging Face Edge

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  sync-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Mark README as edge channel
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          text = text.replace("title: Reachy Mini Voice Assistant", "title: Reachy Mini Voice Assistant Edge", 1)
          text = text.replace(
              "short_description: Reachy Mini voice companion for Home Assistant",
              "short_description: Edge channel for Reachy Mini Voice Assistant",
              1,
          )
          readme.write_text(text, encoding="utf-8")
          PY

      - name: Create fresh commit and push to Hugging Face edge space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git checkout --orphan hf-edge-sync
          git add -A
          git commit -m "Fresh edge sync: $(date +%Y-%m-%d_%H:%M:%S)"

          git remote add hf-edge https://lichao622:$HF_TOKEN@huggingface.co/spaces/lichao622/reachy_mini_ha_voice_edge
          git lfs push hf-edge hf-edge-sync --all
          git push hf-edge hf-edge-sync:main --force
